events {
    worker_connections 1024;
}

http {
    include /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost 127.0.0.1;

        root "/Users/ethan/Desktop/icfish copy";
        index index.html;

        # Serve local files
        location / {
            try_files $uri $uri/ =404;
        }

        # Capture endpoints (POST only)
        location /captures/ {
            proxy_pass http://127.0.0.1:5001;
            proxy_set_header Host $host;
        }

        # Validate credentials
        location /validate_creds {
            proxy_pass http://127.0.0.1:5001;
            proxy_set_header Host $host;
        }

        # API endpoints
        location /api/check-state {
            proxy_pass http://127.0.0.1:5002;
            proxy_set_header Host $host;
        }

        location /api/set-state {
            proxy_pass http://127.0.0.1:5002;
            proxy_set_header Host $host;
        }

        location /api/get-state {
            proxy_pass http://127.0.0.1:5002;
            proxy_set_header Host $host;
        }

        location /api/resend-request {
            proxy_pass http://127.0.0.1:5002;
            proxy_set_header Host $host;
        }

        location /api/get-resend-requests {
            proxy_pass http://127.0.0.1:5002;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:5001;
            proxy_set_header Host $host;
        }

        # Panel
        location /panel {
            proxy_pass http://127.0.0.1:5001;
            proxy_set_header Host $host;
        }
    }
}